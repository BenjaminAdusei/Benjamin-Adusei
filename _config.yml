# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Benjamin Adusei | EduTech Portfolio"
title_separator          : "-"
name                     : &name "Benjamin Adusei"
description              : &description "Portfolio of Benjamin Adusei – Educator, B.S. Computer Science student at UoPeople, building technology for Ghanaian classrooms."
url                      : https://benjaminadusei.github.io
baseurl                  : "/Benjamin-Adusei"
repository               : "benjaminadusei/Benjamin-Adusei"

# Site Author
author:
  avatar           : "profile.png"   # You can upload a profile picture later
  name             : "Benjamin Adusei"
  pronouns         : 
  bio              : " A teacher with 9+ years experience in Ghanaian and Vietname. A B.S. Computer Science student at University of the People (WASC accredited). Building EduTech tools that work offline."
  location         : "Ghana"
  employer         : "Educator"
  uri              : https://benjaminadusei.github.io/Benjamin-Adusei
  email            : "bkadusei94@gmail.com"  

  # Academic websites (leave blank if not applicable)
  academia         : 
  arxiv            : 
  googlescholar    : 
  inspire-hep      : 
  impactstory      : 
  orcid            : 
  semantic         : 
  ssrn             : 
  pubmed           : 
  researchgate     : 
  scopus           : 
  zotero           : 

  # Repositories and software development
  bitbucket        : 
  codepen          : 
  dribbble         : 
  github           : "benjaminadusei"
  kaggle           :  
  stackoverflow    :    

  # Social media (add only what you use)
  linkedin         : "benjamin-adusei"   
  twitter          : 
  bluesky          : 
  facebook         : 
  instagram        : 

# Publication Category - keep as is if you don't have publications yet
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   :  
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false


google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :


twitter:
  username               : 
facebook:
  username               :benjaminkwakuadusei@facebook.com
  app_id                 :
  publisher              :
og_image                 :  
og_description           :  


# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
